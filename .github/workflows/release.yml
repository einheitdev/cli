name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libzmq3-dev libsodium-dev libyaml-cpp-dev \
            libreadline-dev pkg-config cmake ninja-build clang mold

      - name: Configure
        run: cmake --preset default

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Package
        run: |
          TAG="${GITHUB_REF_NAME}"
          OUT="einheit-${TAG}-linux-x86_64"
          mkdir -p "dist/${OUT}"
          cp build/einheit "dist/${OUT}/"
          cp LICENSE README.md CLAUDE.md "dist/${OUT}/"
          cp aliases.yaml.example theme.yaml.example \
            "dist/${OUT}/" || true
          tar -C dist -czf "${OUT}.tar.gz" "${OUT}"
          sha256sum "${OUT}.tar.gz" > "${OUT}.tar.gz.sha256"

      - name: Upload release artefacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            einheit-*.tar.gz
            einheit-*.tar.gz.sha256
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
